{# spinners.html #}
<div id="spinners" style="display: none;">
  <div class="d-flex align-items-center gap-2">
    <div class="spinner-border spinner-border-sm text-success" role="status" style="width: 1.2rem; height: 1.2rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
    <span class="text-success" style="font-size: 0.9rem; font-weight: 500;">
      {% if install_name %}
        Installing {{ install_name|capitalize }}<span class="loading-dots"></span>
      {% elif spinner_context is defined and spinner_context is not none %}
        {{ spinner_context }}<span class="loading-dots"></span>
      {% else %}
        Processing<span class="loading-dots"></span>
      {% endif %}
    </span>
  </div>
</div>

<style>
  /* Animated dots for text */
  .loading-dots::after {
    content: '';
    animation: loadingDots 1.5s steps(4, end) infinite;
  }
  
  @keyframes loadingDots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
</style>
